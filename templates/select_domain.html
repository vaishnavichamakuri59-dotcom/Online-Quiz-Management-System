<!DOCTYPE html>
<html>
<head>
    <title>Select Domain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Select Exam Domain</span><br><br>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-5">
    
    <h2 class="text-center text-white mb-4">Choose Your Exam Domain</h2><br><br><br>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="domain-card jee-card text-center p-4">
                <h4>JEE</h4>
                <a href="/instructions/JEE" class="btn btn-light mt-3">Start</a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="domain-card neet-card text-center p-4">
                <h4>NEET</h4>
                <a href="/instructions/NEET" class="btn btn-light mt-3">Start</a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="domain-card ssc-card text-center p-4">
                <h4>SSC</h4>
                <a href="/instructions/SSC" class="btn btn-light mt-3">Start</a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="domain-card gate-card text-center p-4">
                <h4>GATE</h4>
                <a href="/instructions/GATE" class="btn btn-light mt-3">Start</a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
