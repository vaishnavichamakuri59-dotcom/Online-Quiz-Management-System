<!DOCTYPE html>
<html>
<head>
    <title>Edit Question</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow p-4">

        <h3>Edit Question</h3>

        <form method="POST">

            <div class="mb-3">
                <label>Domain</label>
                <input type="text" name="domain" 
                       value="{{ question[7] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Question</label>
                <input type="text" name="question" 
                       value="{{ question[1] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Option 1</label>
                <input type="text" name="option1" 
                       value="{{ question[2] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Option 2</label>
                <input type="text" name="option2" 
                       value="{{ question[3] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Option 3</label>
                <input type="text" name="option3" 
                       value="{{ question[4] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Option 4</label>
                <input type="text" name="option4" 
                       value="{{ question[5] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Answer</label>
                <input type="text" name="answer" 
                       value="{{ question[6] }}" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success">
                Update Question
            </button>

        </form>

    </div>
</div>

</body>
</html>
