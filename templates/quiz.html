<!DOCTYPE html>
<html>
<head>
    <title>Quiz Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Welcome, {{ session['username'] }}</span>
    </div>
</nav>

<div class="container mt-5">
    
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Online Quiz</h2>
        <div class="alert alert-warning text-center">
             Time Remaining: <span id="timer">60</span> seconds
        </div>
        <form method="POST" id="quizForm">

            {% for q in questions %}
                <div class="mb-4">
                    <h5>{{ loop.index }}. {{ q[1] }}</h5>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="{{ q[0] }}" value="{{ q[2] }}" required>
                        <label class="form-check-label">{{ q[2] }}</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="{{ q[0] }}" value="{{ q[3] }}">
                        <label class="form-check-label">{{ q[3] }}</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="{{ q[0] }}" value="{{ q[4] }}">
                        <label class="form-check-label">{{ q[4] }}</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="{{ q[0] }}" value="{{ q[5] }}">
                        <label class="form-check-label">{{ q[5] }}</label>
                    </div>
                </div>
            {% endfor %}

            <div class="text-center">
                <button type="submit" class="btn btn-primary">Submit Quiz</button>
                <a href="/logout" class="btn btn-danger ms-2">Logout</a>
            </div>

        </form>
    </div>

</div>

</body>
<script>
    let timeLeft = 60;  // 60 seconds timer
    let timerDisplay = document.getElementById("timer");

    let countdown = setInterval(function() {
        timeLeft--;
        timerDisplay.textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            alert("Time is up! Submitting quiz...");
            document.getElementById("quizForm").submit();
        }
    }, 1000);
</script>
</html>
